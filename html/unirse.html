<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unirse</title>
    <link rel="stylesheet" href="../css/albums-de-estudio_eps_video-albums-en-vivo_giras.css">
    <link rel="stylesheet" href="../css/unirse.css">
    <link rel="icon" href="../imagenes/icono1.jpg">
    <meta name="robots" content="index,follow">
    <meta name="author" content="Walter Padilla">
    <meta name="description" content="Únete a TS-Society: completa tu registro Swiftie, comparte tu era favorita y forma parte de la comunidad de fans de Taylor Swift." />
</head>
<body>
    <h1>¡Formá parte de nuestra sociedad swiftie!:</h1>
    <section>
        <div class="volver">
            <a class="inicio" href="taylor-society.html">&lt&lt Inicio</a>
        </div>
    </section>
    <main>
        <form action="">
            <fieldset>
                <legend>Datos personales</legend>
                <label for="nombre/s">Nombre/s:</label>
                <input required type="text" name="nombre/s" placeholder="Meredith">
                <label for="apellido">Apellido:</label>
                <input required type="text" name="apellido" placeholder="Grey">
                <label for="email">E-mail:</label>
                <input required type="email" name="email" placeholder="OliviaBenson13@tswift.com">
                <label for="usuario">Nombre de usuario:</label>
                <input required type="text" name="usuario" placeholder="Swiftie4Ever0013">
                <label for="contraseña">Contraseña:</label>
                <input required type="password" name="contraseña" placeholder="********">
            </fieldset>
            <fieldset>
                <legend>Datos opcionales</legend>
                <label for="era-favorita">Era favorita:</label>
                <select name="era-favorita" id="era-favorita">
                    <option value="ninguno">---</option>
                    <option value="todos">Todas</option>
                    <option value="debut">Debut</option>
                    <option value="fearless">Fearless</option>
                    <option value="speaknow">Speak Now</option>
                    <option value="red">Red</option>
                    <option value="1989">1989</option>
                    <option value="reputation">Reputation</option>
                    <option value="lover">Lover</option>
                    <option value="folklore">Folklore</option>
                    <option value="evermore">Evermore</option>
                    <option value="midnights">Midnights</option>
                    <option value="showgirl">The Life Of a Showgirl</option>
                </select>
                <label for="cancion">Canción favorita:</label>
                <input type="text" name="cancion" placeholder="All Too Well 10 min version">
                <label for="letra">Estrofa favorita:</label>
                <textarea rows="4" name="estrofa" id="estrofa" class="estrofa" placeholder="´´Larga vida a los muros que atravesamos, cómo las luces del reino brillaron sólo para ti y para mi...´´"></textarea>
            </fieldset>
            <fieldset>
                <legend>Nivel de fan</legend>
                <label for="nivel">Nivel de fan Swiftie:</label>
                <select class="nivel" name="nivel" id="nivel">
                    <option value="ninguno" class="ninguno">---</option>
                    <option class="casual" value="casual">1. Curioso Casual – “Me sé Love Story y con eso me alcanza.”</option>
                    <option value="corista">2. Corista de ducha – “Canto Shake It Off mientras me baño, desafinado pero feliz.”</option>
                    <option value="bibliotecario">3. Bibliotecario de Letras Swiftie – “Tengo todas las canciones clasificadas como si fueran tomos de una enciclopedia.”</option>
                    <option value="detective">4. Detective de Easter Eggs – “Analizo cada post de Taylor buscando pistas ocultas.”</option>
                    <option value="archivista">5. Archivista de Eras – “Tengo carpetas con fotos, letras y outfits de cada era.”</option>
                    <option value="corazon-roto">6. Swiftie de corazón roto – “Lloro con All Too Well (10 min version) cada vez que la escucho.”</option>
                    <option value="embajador">7. Embajador del Reino Swiftie – “Defiendo a Taylor en discusiones como si fuera diplomático oficial.”</option>
                    <option value="sacerdote">8. Sumo Sacerdote del Folklore – “Recito letras como si fueran escrituras sagradas.”</option>
                    <option value="multiverso">9. Fan nivel multiverso – “Estoy convencido de que Taylor controla el tiempo, el espacio y mi playlist.”</option>
                    <option value="intergalactico">10. Swiftie Supremo Intergaláctico – “Si hubiera vida en Marte, ya estaría organizando un Eras Tour allá.”</option>
                </select>
            </fieldset>
            <button type="submit">Registrarme</button>
        </form>
    </main>
    <footer>
        <div class="footer-box">
            <p class="copyright">© 2026 TS-Society todos los derechos reservados.</p>
            <a class="sobre-nosotros" href="sobre-nosotros.html">Sobre nosotros.</a>
            <a class="contacto" href="contacto.html">Contacto.</a>
        </div>
        <div class="redes">
            <a class="instagram" href="">Instagram.</a>
            <a class="twitter" href="">Twitter.</a>
            <a class="facebook" href="">Facebook.</a>
        </div>
    </footer>
</body>
</html>
